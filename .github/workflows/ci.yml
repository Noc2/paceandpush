name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run db:migrations:check
      - run: npm run audit:prod
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Install Playwright WebKit
        run: |
          grep -rl "packages.microsoft.com" /etc/apt/sources.list.d | sudo xargs -r rm -f
          npx playwright install --with-deps webkit
      - run: npm run test:e2e
      - run: npm run build

  ios:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode and simulator inventory
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcrun simctl list devices available

      - name: Select iOS simulator
        id: ios-simulator
        run: |
          SIMULATOR_UDID="$(node scripts/select-ios-simulator.mjs)"
          echo "Selected simulator ${SIMULATOR_UDID}"
          echo "udid=${SIMULATOR_UDID}" >> "$GITHUB_OUTPUT"

      - name: Run iOS tests
        run: |
          for attempt in 1 2; do
            rm -rf .build/ios/PacePushTests.xcresult
            set +e
            xcodebuild \
              -project apps/ios/PacePush.xcodeproj \
              -scheme PacePush \
              -destination 'platform=iOS Simulator,id=${{ steps.ios-simulator.outputs.udid }},arch=arm64' \
              -derivedDataPath .build/ios \
              -resultBundlePath .build/ios/PacePushTests.xcresult \
              test \
              CODE_SIGNING_ALLOWED=NO
            status=$?
            set -e

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if [ "$status" -eq 139 ] && [ "$attempt" -eq 1 ]; then
              echo "xcodebuild exited 139; retrying once after simulator reset."
              xcrun simctl shutdown '${{ steps.ios-simulator.outputs.udid }}' || true
              xcrun simctl boot '${{ steps.ios-simulator.outputs.udid }}' || true
              continue
            fi

            exit "$status"
          done

      - name: Upload iOS test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: .build/ios/PacePushTests.xcresult

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: yes | sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Assemble Android debug build
        run: gradle -p apps/android :app:assembleDebug --no-daemon
