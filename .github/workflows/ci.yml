name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run db:migrations:check
      - run: npm run audit:prod
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Install Playwright WebKit
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          npx playwright install --with-deps webkit
      - run: npm run test:e2e
      - run: npm run build

  ios:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode and simulator inventory
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcrun simctl list devices available

      - name: Select iOS simulator
        id: ios-simulator
        run: |
          SIMULATOR_UDID="$(node scripts/select-ios-simulator.mjs)"
          echo "Selected simulator ${SIMULATOR_UDID}"
          echo "udid=${SIMULATOR_UDID}" >> "$GITHUB_OUTPUT"

      - name: Run iOS tests
        run: |
          xcodebuild \
            -project apps/ios/PacePush.xcodeproj \
            -scheme PacePush \
            -destination 'platform=iOS Simulator,id=${{ steps.ios-simulator.outputs.udid }}' \
            -derivedDataPath .build/ios \
            -resultBundlePath .build/ios/PacePushTests.xcresult \
            test \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: .build/ios/PacePushTests.xcresult

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: yes | sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Assemble Android debug build
        run: gradle -p apps/android :app:assembleDebug --no-daemon
